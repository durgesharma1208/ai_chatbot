<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI — Intelligent Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">

        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 1l2.59 7.41L22 11l-7.41 2.59L12 21l-2.59-7.41L2 11l7.41-2.59L12 1z"/>
                        </svg>
                    </div>
                    <span class="brand-name">NexusAI</span>
                </div>
                <button class="icon-btn sidebar-close" id="sidebarCloseBtn" aria-label="Close sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span>New Chat</span>
            </button>

            <div class="chat-history" id="chatHistory">
                <!-- Dynamically populated -->
            </div>

            <div class="sidebar-bottom">
                <button class="sidebar-btn" id="clearChatsBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    <span>Clear Chats</span>
                </button>
                <button class="sidebar-btn" id="settingsBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="3"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="main">

            <!-- Header -->
            <header class="main-header" id="mainHeader">
                <div class="header-left">
                    <button class="icon-btn" id="menuBtn" aria-label="Open menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="6" x2="20" y2="6"/>
                            <line x1="4" y1="12" x2="20" y2="12"/>
                            <line x1="4" y1="18" x2="20" y2="18"/>
                        </svg>
                    </button>
                    <h1 class="header-title" id="headerTitle">New Chat</h1>
                </div>
                <div class="header-right">
                    <div class="model-badge">
                        <span class="model-dot"></span>
                        <span>Gemini 2.5 Flash</span>
                    </div>
                    <button class="icon-btn" id="themeToggleBtn" aria-label="Toggle theme"></button>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">

                <!-- Welcome Screen -->
                <div class="welcome" id="welcomeScreen">
                    <div class="welcome-logo">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 1l2.59 7.41L22 11l-7.41 2.59L12 21l-2.59-7.41L2 11l7.41-2.59L12 1z"/>
                        </svg>
                    </div>
                    <h2 class="welcome-heading">How can I help you today?</h2>
                    <p class="welcome-subtitle">I'm NexusAI, your intelligent assistant powered by Gemini. Ask me anything.</p>
                    <div class="welcome-cards">
                        <button class="welcome-card" data-prompt="Explain quantum computing in simple terms that anyone can understand">
                            <span class="card-emoji">🔬</span>
                            <span class="card-title">Explain quantum computing</span>
                            <span class="card-desc">in simple terms</span>
                        </button>
                        <button class="welcome-card" data-prompt="Write a Python function to find the longest common subsequence of two strings with explanation">
                            <span class="card-emoji">💻</span>
                            <span class="card-title">Write Python code</span>
                            <span class="card-desc">with explanation</span>
                        </button>
                        <button class="welcome-card" data-prompt="What are the best practices for designing scalable REST APIs?">
                            <span class="card-emoji">🏗️</span>
                            <span class="card-title">REST API best practices</span>
                            <span class="card-desc">for scalable systems</span>
                        </button>
                        <button class="welcome-card" data-prompt="Help me brainstorm innovative AI startup ideas for 2025">
                            <span class="card-emoji">💡</span>
                            <span class="card-title">Brainstorm startup ideas</span>
                            <span class="card-desc">powered by AI</span>
                        </button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages" id="messagesList"></div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-avatar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 1l2.59 7.41L22 11l-7.41 2.59L12 21l-2.59-7.41L2 11l7.41-2.59L12 1z"/>
                        </svg>
                    </div>
                    <div class="typing-bubble">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

                <!-- Scroll to bottom button -->
                <button class="scroll-bottom-btn" id="scrollBottomBtn" aria-label="Scroll to bottom">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-container" id="inputContainer">
                    <button class="input-action-btn" id="attachBtn" aria-label="Attach file" title="Attach file">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <textarea id="messageInput" placeholder="Message NexusAI..." rows="1" aria-label="Type your message"></textarea>
                    <button class="send-btn" id="sendBtn" disabled aria-label="Send message"></button>
                </div>
                <p class="input-disclaimer">NexusAI can make mistakes. Consider checking important information.</p>
            </div>
        </main>
    </div>

    <!-- ========== SETTINGS MODAL ========== -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="icon-btn" id="settingsCloseBtn" aria-label="Close settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label class="setting-label">Theme</label>
                    <div class="theme-switcher">
                        <button class="theme-opt" data-set-theme="dark">🌙 Dark</button>
                        <button class="theme-opt" data-set-theme="light">☀️ Light</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">Model</label>
                    <p class="setting-value">Gemini 2.5 Flash</p>
                </div>
                <div class="setting-group">
                    <label class="setting-label">About</label>
                    <p class="setting-value">NexusAI v1.0.0 — Powered by Google Gemini</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
