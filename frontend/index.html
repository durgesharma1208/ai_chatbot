<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">Gemini Chat</span>
                </div>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <span class="plus-icon">+</span>
                New Chat
            </button>
            <div class="sidebar-footer">
                <div class="model-badge">gemini-2.5-flash</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Header -->
            <header class="chat-header">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1>Gemini AI Assistant</h1>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot online"></span>
                    <span class="status-text">Online</span>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">✦</div>
                    <h2>How can I help you today?</h2>
                    <p>I'm powered by Google's Gemini AI. Ask me anything!</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-message="Explain quantum computing in simple terms">
                            🔬 Explain quantum computing
                        </button>
                        <button class="chip" data-message="Write a Python function to sort a list">
                            💻 Write Python code
                        </button>
                        <button class="chip" data-message="What are the best practices for REST API design?">
                            🌐 REST API best practices
                        </button>
                        <button class="chip" data-message="Help me brainstorm startup ideas for AI">
                            💡 Brainstorm AI startup ideas
                        </button>
                    </div>
                </div>

                <!-- Messages will be inserted here -->
                <div class="messages-list" id="messagesList"></div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="typing-avatar">✦</div>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        placeholder="Type your message..."
                        rows="1"
                        autofocus
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">Gemini can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
